<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dynamic Public Resume</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family: Arial, sans-serif;
}

body{
    background:#f5f5f5;
    padding:30px;
}

.resume{
    width:900px;
    margin:auto;
    background:#fff;
    display:flex;
    box-shadow:0 0 20px rgba(0,0,0,.1);
}

.left{
    width:32%;
    background:#1f2937;
    color:#fff;
    padding:30px;
}

.right{
    width:68%;
    padding:35px;
}

.profile-image{
    width:130px;
    height:130px;
    border-radius:50%;
    overflow:hidden;
    margin:auto;
    border:4px solid #fff;
}

.profile-image img{
    width:100%;
    height:100%;
    object-fit:cover;
}

.name{
    text-align:center;
    margin-top:15px;
}

.name h1{
    font-size:28px;
}

.name p{
    color:#cbd5e1;
    margin-top:5px;
}

.section{
    margin-top:35px;
}

.section-title{
    font-size:18px;
    text-transform:uppercase;
    margin-bottom:15px;
    padding-bottom:8px;
    border-bottom:2px solid rgba(255,255,255,.3);
}

.right .section-title{
    color:#111827;
    border-bottom:2px solid #ddd;
}

.contact-item,
.skill-item,
.language-item,
.hobby-item{
    margin-bottom:10px;
    font-size:14px;
    line-height:1.6;
}

.profile-text{
    color:#555;
    line-height:1.8;
    font-size:14px;
}

.job{
    margin-bottom:25px;
}

.job-header{
    display:flex;
    justify-content:space-between;
    margin-bottom:8px;
}

.job-title{
    font-weight:bold;
    color:#111827;
}

.job-date{
    color:#777;
    font-size:13px;
}

.job-company{
    color:#666;
    margin-bottom:8px;
    font-size:14px;
}

.job ul{
    padding-left:18px;
    color:#555;
    line-height:1.8;
}

.education{
    margin-bottom:20px;
}

.education h4{
    margin-bottom:5px;
}

.education p{
    color:#666;
    line-height:1.6;
}
</style>
</head>
<body>

<div class="resume">

    <div class="left">
        <div class="profile-image">
            <img id="profileImage" src="https://via.placeholder.com/200" alt="Profile Picture">
        </div>

        <div class="name">
            <h1 id="fullName">Loading...</h1>
            <p id="designation"></p>
        </div>

        <div class="section">
            <h3 class="section-title">Contact</h3>
            <div id="contact"></div>
        </div>

        <div class="section">
            <h3 class="section-title">Skills</h3>
            <div id="skills"></div>
        </div>

        <div class="section">
            <h3 class="section-title">Languages</h3>
            <div id="languages"></div>
        </div>

        <div class="section">
            <h3 class="section-title">Hobbies</h3>
            <div id="hobbies"></div>
        </div>
    </div>

    <div class="right">
        <div class="section">
            <h3 class="section-title">Profile</h3>
            <p class="profile-text" id="profileSummary"></p>
        </div>

        <div class="section">
            <h3 class="section-title">Work Experience</h3>
            <div id="experience"></div>
        </div>

        <div class="section">
            <h3 class="section-title">Education</h3>
            <div id="education"></div>
        </div>
    </div>
</div>

<script>
// EXACT data shape provided by your incoming backend API response
const apiResponseData = {
  personalInfo: {
    fullName: "Biswaranjan Pradhan",
    designation: "Senior React Developer",
    phone: "+91 9876543210",
    email: "biswa@gmail.com",
    website: "www.designdons.com",
    address: "Bhubaneswar, Odisha",
    photo: ""
  },
  summary: "Experienced React Developer with 5+ years of expertise in React, JavaScript, UI/UX Design, Node.js and scalable web application development.",
  skills: ["React", "JavaScript", "Node.js", "HTML", "CSS", "MySQL"],
  languages: ["English", "Hindi", "Odia"],
  hobbies: ["Coding", "Cricket", "Reading"],
  experience: [
    {
      id: 1,
      position: "Senior React Developer",
      company: "DesignDons",
      startDate: "2022",
      endDate: "Present",
      responsibilities: [
        "Built scalable React applications",
        "Designed reusable components",
        "Optimized performance"
      ]
    }
  ],
  education: [
    {
      id: 1,
      degree: "B.Tech Computer Science",
      institute: "BPUT",
      year: "2015 - 2019"
    }
  ]
};

// Injection Orchestrator Function
function populateResume(data) {
    // 1. Core Profile Details
    document.getElementById("profileImage").src = data.personalInfo.photo || "https://via.placeholder.com/200";
    document.getElementById("fullName").textContent = data.personalInfo.fullName;
    document.getElementById("designation").textContent = data.personalInfo.designation;
    document.getElementById("profileSummary").textContent = data.summary;

    // 2. Contact Details Mapping
    document.getElementById("contact").innerHTML = `
        <div class="contact-item">📞 ${data.personalInfo.phone}</div>
        <div class="contact-item">✉️ ${data.personalInfo.email}</div>
        <div class="contact-item">🌐 ${data.personalInfo.website}</div>
        <div class="contact-item">📍 ${data.personalInfo.address}</div>
    `;

    // 3. Simple Arrays Mapping (Skills, Languages, Hobbies)
    document.getElementById("skills").innerHTML = data.skills.map(val => `<div class="skill-item">• ${val}</div>`).join("");
    document.getElementById("languages").innerHTML = data.languages.map(val => `<div class="language-item">• ${val}</div>`).join("");
    document.getElementById("hobbies").innerHTML = data.hobbies.map(val => `<div class="hobby-item">• ${val}</div>`).join("");

    // 4. Structural Array Mapping: Work Experience (Mapping position to template UI)
    document.getElementById("experience").innerHTML = data.experience.map(job => `
        <div class="job">
            <div class="job-header">
                <div class="job-title">${job.position}</div>
                <div class="job-date">${job.startDate} - ${job.endDate}</div>
            </div>
            <div class="job-company">${job.company}</div>
            <ul>
                ${job.responsibilities.map(resp => `<li>${resp}</li>`).join("")}
            </ul>
        </div>
    `).join("");

    // 5. Structural Array Mapping: Education
    document.getElementById("education").innerHTML = data.education.map(edu => `
        <div class="education">
            <h4>${edu.degree}</h4>
            <p>${edu.institute}</p>
            <p>${edu.year}</p>
        </div>
    `).join("");
}

// Fire injection on load
populateResume(apiResponseData);
</script>

</body>
</html>
